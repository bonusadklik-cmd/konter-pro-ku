<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konter Pro - Manajemen Konter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<!-- LAYAR LOGIN -->
<div id="loginScreen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-80 shadow-2xl text-center">
        <i class="fa-solid fa-store text-5xl text-cyan-500 mb-3"></i>
        <h1 class="text-2xl font-bold">Konter Pro</h1>
        <p class="text-gray-500 text-sm mb-5">Sistem Manajemen Konter</p>
        <input type="text" id="username" placeholder="Username" class="w-full border p-2 rounded mb-2">
        <input type="password" id="password" placeholder="Password" class="w-full border p-2 rounded mb-4">
        <button onclick="login()" class="w-full bg-gray-800 text-white p-2 rounded font-semibold">Login</button>
        <p class="text-xs text-gray-400 mt-3">Username: admin | Password: admin</p>
    </div>
</div>

<!-- APLIKASI UTAMA -->
<div id="mainApp" class="hidden flex min-h-screen">
    <!-- SIDEBAR -->
    <div class="w-64 bg-gray-900 text-gray-300 min-h-screen p-4">
        <div class="border-b border-gray-700 pb-4 mb-4">
            <i class="fa-solid fa-store text-2xl text-cyan-400"></i>
            <h1 class="font-bold text-white">Konter Pro</h1>
        </div>
        
        <div class="space-y-2">
            <div onclick="goToPage('dashboard')" class="menu-item p-2 rounded cursor-pointer hover:bg-gray-800">
                <i class="fa-solid fa-chart-line w-6"></i> Dashboard
            </div>
            <div onclick="goToPage('kasir')" class="menu-item p-2 rounded cursor-pointer hover:bg-gray-800">
                <i class="fa-solid fa-cash-register w-6"></i> Kasir
            </div>
            <div onclick="goToPage('riwayat')" class="menu-item p-2 rounded cursor-pointer hover:bg-gray-800">
                <i class="fa-solid fa-clock w-6"></i> Riwayat
            </div>
            <div onclick="goToPage('kredit')" class="menu-item p-2 rounded cursor-pointer hover:bg-gray-800">
                <i class="fa-solid fa-credit-card w-6"></i> Kredit
            </div>
            <div onclick="goToPage('stok')" class="menu-item p-2 rounded cursor-pointer hover:bg-gray-800">
                <i class="fa-solid fa-boxes w-6"></i> Stok Barang
            </div>
            <div onclick="goToPage('laporan')" class="menu-item p-2 rounded cursor-pointer hover:bg-gray-800">
                <i class="fa-solid fa-chart-simple w-6"></i> Laporan
            </div>
            <div onclick="goToPage('pengaturan')" class="menu-item p-2 rounded cursor-pointer hover:bg-gray-800">
                <i class="fa-solid fa-gear w-6"></i> Pengaturan
            </div>
        </div>
        
        <div class="mt-10 pt-4 border-t border-gray-700">
            <button onclick="logout()" class="w-full bg-red-500/20 text-red-400 p-2 rounded text-sm hover:bg-red-500/30">
                <i class="fa-solid fa-sign-out-alt"></i> Keluar
            </button>
        </div>
    </div>

    <!-- KONTEN UTAMA (isi berubah saat menu diklik) -->
    <div class="flex-1 p-6">
        <div id="pageContent" class="bg-white rounded-xl shadow p-6 min-h-[500px]">
            <p class="text-gray-400">Silakan pilih menu di samping</p>
        </div>
    </div>
</div>

<script>
    // Fungsi Login
    function login() {
        let user = document.getElementById('username').value;
        let pass = document.getElementById('password').value;
        
        if (user === 'admin' && pass === 'admin') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            goToPage('dashboard');
        } else {
            alert('Username atau password salah! Gunakan: admin / admin');
        }
    }

    // Fungsi Logout
    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').classList.add('hidden');
    }

    // Fungsi Ganti Halaman (SEMUA MENU BISA DIKLIK)
    function goToPage(page) {
        let content = document.getElementById('pageContent');
        
        if (page === 'dashboard') {
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">📊 Dashboard</h2>
                <div class="grid grid-cols-3 gap-4 mb-4">
                    <div class="bg-blue-50 p-4 rounded"><p class="text-gray-500">Penjualan Hari Ini</p><p class="text-2xl font-bold">Rp 0</p></div>
                    <div class="bg-green-50 p-4 rounded"><p class="text-gray-500">Saldo Kas</p><p class="text-2xl font-bold">Rp 0</p></div>
                    <div class="bg-purple-50 p-4 rounded"><p class="text-gray-500">Stok Tersisa</p><p class="text-2xl font-bold">0 Unit</p></div>
                </div>
                <p class="text-gray-400">Selamat datang di sistem manajemen konter.</p>
            `;
        }
        else if (page === 'kasir') {
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">🧾 Kasir</h2>
                <div class="bg-gray-100 p-4 rounded">
                    <p class="font-semibold">Transaksi Baru</p>
                    <input type="text" placeholder="Nama Barang" class="w-full p-2 border rounded mt-2">
                    <input type="number" placeholder="Harga" class="w-full p-2 border rounded mt-2">
                    <input type="number" placeholder="Jumlah" class="w-full p-2 border rounded mt-2">
                    <button class="bg-cyan-600 text-white px-4 py-2 rounded mt-3">Proses</button>
                </div>
            `;
        }
        else if (page === 'riwayat') {
            content.innerHTML = `<h2 class="text-2xl font-bold mb-4">📜 Riwayat Transaksi</h2><p class="text-gray-400">Belum ada transaksi.</p>`;
        }
        else if (page === 'kredit') {
            content.innerHTML = `<h2 class="text-2xl font-bold mb-4">💳 Kredit Pelanggan</h2><p class="text-gray-400">Data kredit akan muncul di sini.</p>`;
        }
        else if (page === 'stok') {
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">📦 Stok Barang</h2>
                <button class="bg-green-600 text-white px-4 py-2 rounded" onclick="alert('Fitur tambah stok akan segera hadir')">+ Tambah Barang</button>
                <p class="text-gray-400 mt-4">Belum ada data stok.</p>
            `;
        }
        else if (page === 'laporan') {
            content.innerHTML = `<h2 class="text-2xl font-bold mb-4">📈 Laporan</h2><p class="text-gray-400">Laporan keuangan akan muncul di sini.</p>`;
        }
        else if (page === 'pengaturan') {
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">⚙️ Pengaturan</h2>
                <label>Nama Toko:</label>
                <input type="text" id="namaToko" value="Konter Pro" class="border p-2 rounded w-full mb-3">
                <button class="bg-blue-600 text-white px-4 py-2 rounded" onclick="alert('Pengaturan tersimpan')">Simpan</button>
            `;
        }
        
        // Update style menu aktif
        document.querySelectorAll('.menu-item').forEach(item => {
            item.classList.remove('bg-gray-800', 'text-white');
            item.classList.add('text-gray-300');
        });
        event.currentTarget.classList.add('bg-gray-800', 'text-white');
    }
</script>

</body>
</html>
